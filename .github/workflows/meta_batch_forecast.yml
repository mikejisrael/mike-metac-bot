name: Meta Batch Forecast (meta_batch_forecast.py)

on:
  workflow_dispatch:  # triggered via cron-job.org, every ~3 days
  #schedule:
    #- cron: "0 9 */3 * *"  # not used — cron-job.org is the actual trigger,
    # same pattern as tournament_forecast.yaml. Left here as documentation
    # of the intended cadence if cron-job.org is ever replaced.

# Prevent overlapping runs (queue rather than cancel — submissions are
# stateful, same reasoning as tournament_forecast.yaml).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    # Bounded above the script's own 5-minute poll budget (wait_and_alert_
    # when_ready's max_wait) plus headroom for fetch/submit/install steps —
    # this is a guard against the JOB hanging, not the normal-case runtime.
    timeout-minutes: 15
    permissions:
      contents: write  # needed to push meta batches/ results back — both
      # for dedup (fetch_questions's already_done check) AND so the
      # batch_jobs file this run creates actually exists on Mike's local
      # machine after a `git pull`, which --check (run locally, not via
      # this workflow — see meta_batch_forecast.py's wait_and_alert_
      # when_ready) depends on.

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run meta_batch_forecast.py
        run: poetry run python meta_batch_forecast.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          METAC_TOURNAMENT_TOKEN: ${{ secrets.METAC_TOURNAMENT_TOKEN }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # REQUIRED for the "batch ready, go run --check" alert to
          # actually fire — confirm this secret exists under Settings ->
          # Secrets and variables -> Actions. Also missing from
          # tournament_forecast.yaml as of this writing; same fix needed
          # there for any of today's new alerts to work outside local runs.
          ALERT_NTFY_TOPIC: ${{ secrets.ALERT_NTFY_TOPIC }}

      - name: Commit batch job file for later --check / dedup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "meta batches/"
          git diff --cached --quiet && echo "No new batch files to commit." || (
            git commit -m "chore: meta batch forecast submission [skip ci]" &&
            git push
          )
