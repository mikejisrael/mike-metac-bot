name: Meta Refresh Check (meta_refresh_forecast.py --check)

on:
  workflow_dispatch:  # manual trigger from GitHub UI, and the target for a
                       # cron-job.org scheduled job — same reasoning as
                       # tournament_forecast_v2.yaml: GitHub's native
                       # `schedule:` trigger is unreliable, so external cron
                       # drives this too.
  #schedule:
    #- cron: "0 9,21 * * *"  # SUGGESTED only, not live — set the actual
    # schedule in cron-job.org hitting this workflow's workflow_dispatch,
    # same as tournament_forecast.yaml/tournament_forecast_v2.yaml. Twice
    # daily per Mike's call (2026-07-15): --submit only ever happens
    # manually now (dashboard-driven, Step 1-4 of the batch-path refresh
    # work), so --check just needs to run often enough to harvest whatever
    # was queued since the last run — twice a day comfortably clears
    # Anthropic's Batch API turnaround without leaving results sitting
    # around for long. 09:00/21:00 UTC picked as a simple 12h split; adjust
    # in cron-job.org to whatever suits Mike's actual usage pattern.

# Prevent overlapping runs OF THIS WORKFLOW (queue rather than cancel — a
# --check run in progress moves job files into checked_refresh/ etc., so
# letting two runs interleave could race on the same files). Scoped only to
# this workflow, same as tournament_forecast_v2.yaml's group — does NOT
# prevent this from running at the same time as v1/v2/meta_phase_reports,
# which is why the commit step below has the same retry-with-rebase logic
# those already needed.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  refresh-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push "meta batches/" back for dedup/history

    steps:
      - name: Check out repository
        # Same stale-checkout fix as tournament_forecast_v2.yaml — ref: main
        # forces a live fetch of main's actual current tip whenever this
        # step runs, not whatever commit was on main at DISPATCH time.
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run meta_refresh_forecast.py --check
        run: poetry run python meta_refresh_forecast.py --check
        env:
          # --check itself only actually touches ANTHROPIC_API_KEY (batch
          # retrieve/results calls) and METAC_TOURNAMENT_TOKEN (submitting
          # to Metaculus) — research/live-data grounding happens at
          # --submit time, baked into the prompt already sent to the
          # batch, not re-run here. Full env var set still passed anyway,
          # matching tournament_forecast_v2.yaml exactly: meta_refresh_
          # forecast.py imports the same cached_llm/meta_research/
          # live_data modules at module level, and passing everything
          # those *could* need is simpler and more robust than trying to
          # trim this down to exactly what --check's own code path uses
          # today, which could silently break in CI the moment that
          # changes.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          METAC_TOURNAMENT_TOKEN: ${{ secrets.METAC_TOURNAMENT_TOKEN }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

      - name: Commit refresh results for dedup
        # if: always() — same reasoning as tournament_forecast_v2.yaml:
        # partial progress (any batch that WAS successfully checked before
        # a mid-run failure on a later one) should still be committed, not
        # thrown away when the runner is torn down. check_refresh_batch
        # already processes every pending batch file independently and
        # keeps going past one failure (2026-07-15 fix), so partial
        # progress here is a real, common case, not just a rare edge case.
        #
        # RETRY LOGIC: same collision defense as tournament_forecast_v2.yaml
        # — "meta batches/" (note: real directory name has a literal space,
        # hence the quoting below) can also be written by
        # meta_batch_forecast.py's own scheduled runs. A plain `git push`
        # would eventually hit the same "fetch first" rejection those other
        # workflows already had to handle. Retries with rebase instead of
        # failing outright on the first collision.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "meta batches/" 2>/dev/null || true
          git diff --cached --quiet && echo "No new results to commit." || (
            git commit -m "chore: meta_refresh_forecast --check results [skip ci]"

            attempt=1
            max_attempts=5
            until git push; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Push failed after $max_attempts attempts — giving up."
                exit 1
              fi
              echo "Push rejected (attempt $attempt/$max_attempts) — likely a concurrent push from another workflow. Rebasing and retrying..."
              git pull --rebase
              attempt=$((attempt + 1))
              sleep $((RANDOM % 10 + 5))  # small random backoff so racing workflows don't retry in lockstep
            done
          )