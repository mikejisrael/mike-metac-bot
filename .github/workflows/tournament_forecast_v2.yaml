name: Tournament Forecast v2 (tournament_forecast_v2.py)

on:
  workflow_dispatch:  # manual trigger from GitHub UI, and the target for a
                       # cron-job.org scheduled job — same reasoning as
                       # tournament_forecast.yaml: GitHub's native `schedule:`
                       # trigger is unreliable, so external cron drives this too.
  #schedule:
    #- cron: "0,30 * * * *"  # matches the actual external cron-job.org
    # schedule already in production for tournament_forecast.yaml (v1) —
    # confirmed by Mike (2026-07-14), NOT the "7,37" pattern this comment
    # previously guessed at (that was an unverified assumption on my part,
    # likely a stale holdover from an old Task Scheduler config, not
    # reflective of the actual GitHub Actions / cron-job.org setup).
    # DELIBERATELY ALIGNED with v1's timing, not offset: coverage has
    # empirically been excellent because new questions tend to become
    # available right at :00/:30 — Market Pulse's final-hour trigger
    # benefits from that same "run right when things change" alignment
    # rather than trading it away to reduce collision odds. The
    # retry-on-push-rejection logic below is the real defense against
    # git collisions between this workflow, v1's cron, and
    # meta_phase_reports.yaml — not timing offset.

# Prevent overlapping runs OF THIS WORKFLOW (queue rather than cancel, since
# submissions are stateful). NOTE: this does NOT prevent tournament_forecast.yaml
# (v1) and this workflow from running at the same time as EACH OTHER —
# concurrency groups are scoped per-workflow by github.workflow, so v1 and v2
# are independent groups. That's why the commit step below has real retry
# logic rather than relying on concurrency alone to avoid push collisions.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  forecast:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push tournament_batches back for dedup

    steps:
      - name: Check out repository
        # Same stale-checkout fix as tournament_forecast.yaml (2026-07-02):
        # ref: main forces a live fetch of main's actual current tip
        # whenever this step runs, not whatever commit was on main at
        # DISPATCH time — matters here even more than for v1, since this
        # workflow's job can sit queued behind other runs (concurrency
        # cancel-in-progress: false) for a while before it actually starts.
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Run tournament_forecast_v2.py
        run: poetry run python tournament_forecast_v2.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }}
          METAC_TOURNAMENT_TOKEN: ${{ secrets.METAC_TOURNAMENT_TOKEN }}
          # CHANGED (2026-07-14): the Market-Pulse-only override that lived
          # here (METAC_TOURNAMENT_IDS: "33066") is REMOVED — this now falls
          # back to tournament_forecast_v2.py's own in-code default,
          # [FUTUREEVAL_TOURNAMENT_ID, MARKET_PULSE_TOURNAMENT_ID], so this
          # cron now genuinely forecasts and submits for FutureEval too.
          #
          # PARALLEL-TEST PERIOD: tournament_forecast.py (v1) is still
          # running on its own cron at the same time, but with
          # SUBMISSION_DISABLED_PARALLEL_TEST = True — it detects and
          # alerts on new FutureEval questions same as always, but does NOT
          # forecast or submit anything, leaving that entirely to v2 (this
          # workflow). This lets v2 prove itself on real, live FutureEval
          # questions with v1 still watching in a safe, non-submitting
          # capacity, before v1's cron is disabled for good (Stage 3 of the
          # v1->v2 merge). Expect 2 "new question detected" ntfy alerts per
          # new FutureEval question during this period (v1's own detection
          # + v2's own detection, independent timing) + 1 "forecast
          # submitted" alert once v2 actually forecasts it.
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          # Confirm ALERT_NTFY_TOPIC exists under Settings -> Secrets and
          # variables -> Actions before relying on ntfy alerts firing from
          # scheduled runs — same requirement tournament_forecast.yaml
          # already documented (2026-06-30): GitHub Actions runners don't
          # have a local .env, only what's explicitly passed here.
          ALERT_NTFY_TOPIC: ${{ secrets.ALERT_NTFY_TOPIC }}

      - name: Commit forecast results for dedup
        # if: always() — same reasoning as tournament_forecast.yaml
        # (2026-07-02): partial progress (whatever got submitted before a
        # mid-run failure) should still be committed, not thrown away when
        # the runner is torn down.
        #
        # RETRY LOGIC (2026-07-14, built in from the start this time,
        # rather than added reactively like meta_phase_reports.yaml needed
        # to be after a real collision): this workflow commits to the SAME
        # tournament_batches/ and watch_state/ directories that
        # tournament_forecast.yaml (v1) ALSO commits to on its own 30-min
        # cadence, PLUS meta_phase_reports.yaml touches watch_state/ too —
        # three independent scheduled processes now writing to overlapping
        # paths. A plain `git push` here would eventually hit the same
        # "fetch first" rejection Mike hit locally and meta_phase_reports.yaml
        # hit in production on 2026-07-13/14. Retries with rebase instead of
        # failing outright on the first collision.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tournament_batches/ watch_state/ 2>/dev/null || true
          git diff --cached --quiet && echo "No new results to commit." || (
            git commit -m "chore: tournament forecast v2 results [skip ci]"

            attempt=1
            max_attempts=5
            until git push; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                echo "Push failed after $max_attempts attempts — giving up."
                exit 1
              fi
              echo "Push rejected (attempt $attempt/$max_attempts) — likely a concurrent push from v1's cron or meta_phase_reports.yaml. Rebasing and retrying..."
              git pull --rebase
              attempt=$((attempt + 1))
              sleep $((RANDOM % 10 + 5))  # small random backoff so racing workflows don't retry in lockstep
            done
          )